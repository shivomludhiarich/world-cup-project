<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Dashboard — Football Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">⚽ Football Analytics</div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/predictor" class="nav-link">Match Predictor</a>
            <a href="/players" class="nav-link active">Player Dashboard</a>
            <a href="/clusters" class="nav-link">Player Clusters</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>Player Dashboard</h1>
        <p>Search and analyse players from the top 5 European leagues</p>
    </div>

    <div class="players-container">

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="player-search" 
                       placeholder="Search player name..." 
                       oninput="searchPlayer(this.value)">
                <div id="search-suggestions" class="suggestions hidden"></div>
            </div>
        </div>

        <div id="player-profile" class="player-profile hidden">

            <div class="profile-header">
                <div class="profile-info">
                    <h2 id="profile-name"></h2>
                    <div class="profile-badges">
                        <span class="badge" id="profile-position"></span>
                        <span class="badge badge-club" id="profile-club"></span>
                        <span class="badge badge-cluster" id="profile-cluster"></span>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-goals"></div>
                    <div class="stat-label">Goals / 90</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-assists"></div>
                    <div class="stat-label">Assists / 90</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-ga"></div>
                    <div class="stat-label">G+A / 90</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-minutes"></div>
                    <div class="stat-label">Mins / Game</div>
                </div>
            </div>

            <div class="charts-row">
                <div class="chart-box">
                    <h3>Performance Radar</h3>
                    <div id="radar-chart" style="height:300px"></div>
                </div>
                <div class="chart-box">
                    <h3>Market Value History</h3>
                    <div id="value-chart" style="height:300px"></div>
                </div>
            </div>

            <div class="similar-section">
                <h3>Similar Players</h3>
                <div id="similar-players"></div>
            </div>

        </div>

        <div class="top-players-section">
            <h3>Top Players</h3>
            <div class="filter-row">
                <select id="position-filter" onchange="loadTopPlayers()">
                    <option value="Attack">Attackers</option>
                    <option value="Midfield">Midfielders</option>
                    <option value="Defender">Defenders</option>
                </select>
                <select id="metric-filter" onchange="loadTopPlayers()">
                    <option value="goals_per90">Goals / 90</option>
                    <option value="assists_per90">Assists / 90</option>
                    <option value="goals_assists_per90">G+A / 90</option>
                    <option value="value_millions">Market Value</option>
                </select>
            </div>
            <div id="top-players-chart" style="height:400px"></div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script>
        // load top players on page load
        loadTopPlayers()

        let searchTimeout = null

        function searchPlayer(query) {
            clearTimeout(searchTimeout)
            if (query.length < 2) {
                document.getElementById('search-suggestions').classList.add('hidden')
                return
            }
            searchTimeout = setTimeout(async () => {
                const response = await fetch(`/api/player_search?q=${query}`)
                const players = await response.json()
                showSuggestions(players)
            }, 300)
        }

        function showSuggestions(players) {
            const box = document.getElementById('search-suggestions')
            if (players.length === 0) {
                box.classList.add('hidden')
                return
            }
            box.innerHTML = players.map(p => 
                `<div class="suggestion-item" onclick="loadPlayer('${p}')">${p}</div>`
            ).join('')
            box.classList.remove('hidden')
        }

        async function loadPlayer(name) {
            document.getElementById('search-suggestions').classList.add('hidden')
            document.getElementById('player-search').value = name

            const statsRes = await fetch(`/api/player_stats?name=${encodeURIComponent(name)}`)
            const stats = await statsRes.json()

            if (stats.error) { alert('Player not found'); return }

            const latest = stats[0]

            // show profile
            document.getElementById('player-profile').classList.remove('hidden')
            document.getElementById('profile-name').textContent = name
            document.getElementById('profile-position').textContent = latest.position || ''
            document.getElementById('profile-club').textContent = latest.current_club_name || ''

            // get cluster info
            const clusterRes = await fetch(`/api/player_search?q=${encodeURIComponent(name)}`)

            // calculate averages
            const avgGoals = (stats.reduce((s, r) => s + r.goals_per90, 0) / stats.length).toFixed(3)
            const avgAssists = (stats.reduce((s, r) => s + r.assists_per90, 0) / stats.length).toFixed(3)
            const avgGA = (parseFloat(avgGoals) + parseFloat(avgAssists)).toFixed(3)
            const avgMins = (stats.reduce((s, r) => s + r.minutes_per_game, 0) / stats.length).toFixed(1)

            document.getElementById('stat-goals').textContent = avgGoals
            document.getElementById('stat-assists').textContent = avgAssists
            document.getElementById('stat-ga').textContent = avgGA
            document.getElementById('stat-minutes').textContent = avgMins

            // draw radar
            drawRadar(name, avgGoals, avgAssists, avgMins, latest.yellow_cards_per90 || 0)

            // load market value
            const valRes = await fetch(`/api/market_value?name=${encodeURIComponent(name)}`)
            const valData = await valRes.json()
            if (!valData.error) drawValueChart(valData)

            // load similar players
            loadSimilarPlayers(name)
        }

        function drawRadar(name, goals, assists, minutes, yellows) {
            const maxMins = 90

            Plotly.newPlot('radar-chart', [{
                type: 'scatterpolar',
                r: [
                    parseFloat(goals) / 1.5 * 100,
                    parseFloat(assists) / 1.0 * 100,
                    parseFloat(minutes) / maxMins * 100,
                    (1 - Math.min(parseFloat(yellows) / 0.5, 1)) * 100
                ],
                theta: ['Goals/90', 'Assists/90', 'Minutes/Game', 'Discipline'],
                fill: 'toself',
                name: name,
                line: {color: '#3b82f6'}
            }], {
                polar: {radialaxis: {range: [0, 100], showticklabels: false}},
                paper_bgcolor: 'transparent',
                font: {color: '#e2e8f0'},
                margin: {t: 20, b: 20, l: 40, r: 40}
            })
        }

        function drawValueChart(data) {
            Plotly.newPlot('value-chart', [{
                type: 'scatter',
                mode: 'lines+markers',
                x: data.map(d => d.date),
                y: data.map(d => d.market_value_in_eur),
                line: {color: '#3b82f6'},
                fill: 'tozeroy',
                fillcolor: 'rgba(59,130,246,0.1)'
            }], {
                margin: {t: 20, b: 40, l: 50, r: 20},
                yaxis: {title: 'Value (€M)'},
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                font: {color: '#e2e8f0'}
            })
        }

        async function loadSimilarPlayers(name) {
            const response = await fetch(`/api/similar_players?name=${encodeURIComponent(name)}`)
            const players = await response.json()

            if (players.error || players.length === 0) {
                document.getElementById('similar-players').innerHTML = '<p>No similar players found</p>'
                return
            }

            document.getElementById('similar-players').innerHTML = players.map(p => `
                <div class="similar-card" onclick="loadPlayer('${p.player_name}')">
                    <div class="similar-name">${p.player_name}</div>
                    <div class="similar-cluster">${p.cluster_name}</div>
                    <div class="similar-stats">
                        ${p.goals_per90} G/90 · ${p.assists_per90} A/90
                    </div>
                </div>
            `).join('')
        }

        async function loadTopPlayers() {
            const position = document.getElementById('position-filter').value
            const metric = document.getElementById('metric-filter').value

            const response = await fetch(`/api/top_players?position=${position}&metric=${metric}`)
            const players = await response.json()

            const metricLabels = {
                'goals_per90': 'Goals / 90',
                'assists_per90': 'Assists / 90', 
                'goals_assists_per90': 'G+A / 90',
                'value_millions': 'Market Value (€M)'
            }

            Plotly.newPlot('top-players-chart', [{
                type: 'bar',
                orientation: 'h',
                x: players.map(p => p[metric]).reverse(),
                y: players.map(p => p.name).reverse(),
                marker: {color: '#3b82f6'},
                text: players.map(p => p[metric]).reverse(),
                textposition: 'outside'
            }], {
                margin: {t: 20, b: 40, l: 150, r: 60},
                xaxis: {title: metricLabels[metric]},
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                font: {color: '#e2e8f0'}
            })
        }
    </script>

</body>
</html>
